<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>zuhair abbas</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Helvetica+Neue:wght@100;300;400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --white:rgba(255,255,255,0.90);
  --dim:rgba(255,255,255,0.45);
  --faint:rgba(255,255,255,0.18);
  --glow:0 0 12px rgba(255,255,255,0.35),0 0 30px rgba(255,255,255,0.12);
  --font:-apple-system,'Helvetica Neue',Helvetica,Arial,sans-serif;
}
html,body{width:100%;height:100%;overflow:hidden;background:#020510}
body{cursor:none;font-family:var(--font);font-weight:300;color:var(--white)}

/* canvas fills screen */
#c{position:fixed;inset:0;width:100%;height:100%;z-index:0}

/* cursor */
#cur{position:fixed;width:6px;height:6px;border-radius:50%;background:#fff;
  pointer-events:none;z-index:9999;transform:translate(-50%,-50%);
  box-shadow:0 0 8px rgba(255,255,255,0.8),0 0 20px rgba(255,255,255,0.3);
  transition:width .15s,height .15s,opacity .15s}
#cur.big{width:14px;height:14px;opacity:.6}
#cur-trail{position:fixed;width:28px;height:28px;border-radius:50%;
  border:1px solid rgba(255,255,255,0.2);pointer-events:none;z-index:9998;
  transform:translate(-50%,-50%);transition:none}

/* scanlines */
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:5;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.03) 3px,rgba(0,0,0,0.03) 4px)}

/* HUB UI */
#hub{position:fixed;inset:0;z-index:10;pointer-events:none;transition:opacity .8s}
#hub.hidden{opacity:0;pointer-events:none}

.node{position:absolute;transform:translate(-50%,-50%);pointer-events:auto;cursor:none}
.node-box{
  padding:.7rem 1.4rem;
  border:1px solid rgba(255,255,255,0.12);
  background:rgba(2,5,16,0.4);
  backdrop-filter:blur(6px);
  text-align:center;
  transition:border-color .3s,background .3s,transform .2s;
}
.node:hover .node-box{
  border-color:rgba(255,255,255,0.35);
  background:rgba(2,5,16,0.7);
  transform:scale(1.06)
}
.node-n{font-size:.5rem;letter-spacing:.3em;color:var(--faint);margin-bottom:.3rem}
.node-l{font-size:.78rem;letter-spacing:.18em;text-transform:lowercase;
  color:var(--white);text-shadow:var(--glow)}
.node-sub{font-size:.45rem;letter-spacing:.14em;color:var(--faint);margin-top:.25rem;
  opacity:0;transition:opacity .25s}
.node:hover .node-sub{opacity:1}

/* hero text */
#hero{position:fixed;bottom:3rem;left:50%;transform:translateX(-50%);
  z-index:10;text-align:center;pointer-events:none;transition:opacity .7s;white-space:nowrap}
#hero h1{font-size:clamp(2rem,5vw,4.5rem);font-weight:100;letter-spacing:.08em;
  color:var(--white);text-shadow:var(--glow)}
#hero h1 span{font-weight:300}
#hero p{font-size:.55rem;letter-spacing:.32em;color:var(--dim);margin-top:.6rem}
#hero small{font-size:.5rem;letter-spacing:.2em;color:var(--faint);
  display:block;margin-top:.4rem;font-style:italic;
  animation:pulse 3s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:.8}}

/* BACK */
#back{position:fixed;top:1.5rem;left:1.8rem;z-index:200;
  font-size:.52rem;letter-spacing:.25em;text-transform:lowercase;
  color:var(--dim);border:1px solid rgba(255,255,255,.1);
  padding:.45rem .9rem;background:rgba(2,5,16,0.6);
  cursor:none;transition:color .2s,border-color .2s,opacity .3s,box-shadow .2s;
  opacity:0;pointer-events:none}
#back.vis{opacity:1;pointer-events:auto}
#back:hover{color:var(--white);border-color:rgba(255,255,255,.3);box-shadow:var(--glow)}

/* SECTION OVERLAY */
#overlay{position:fixed;inset:0;z-index:50;
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .9s}
#overlay.vis{opacity:1;pointer-events:auto}

.sec-panel{
  max-width:820px;width:90%;max-height:80vh;overflow-y:auto;
  padding:3rem;
  border:1px solid;
  background:rgba(2,5,16,0.75);
  backdrop-filter:blur(16px);
  scrollbar-width:thin;
}
.sec-panel::-webkit-scrollbar{width:2px}
.sec-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15)}

.sec-panel[data-color="red"]{border-color:rgba(220,60,60,0.3);box-shadow:0 0 60px rgba(220,60,60,0.08),inset 0 0 40px rgba(220,60,60,0.03)}
.sec-panel[data-color="blue"]{border-color:rgba(60,130,220,0.3);box-shadow:0 0 60px rgba(60,130,220,0.08),inset 0 0 40px rgba(60,130,220,0.03)}
.sec-panel[data-color="green"]{border-color:rgba(60,200,120,0.3);box-shadow:0 0 60px rgba(60,200,120,0.08),inset 0 0 40px rgba(60,200,120,0.03)}
.sec-panel[data-color="purple"]{border-color:rgba(160,80,220,0.3);box-shadow:0 0 60px rgba(160,80,220,0.08),inset 0 0 40px rgba(160,80,220,0.03)}
.sec-panel[data-color="white"]{border-color:rgba(255,255,255,0.18);box-shadow:0 0 60px rgba(255,255,255,0.05)}

/* accent line per color */
.sec-panel[data-color="red"] .accent{color:rgba(255,100,100,0.9);text-shadow:0 0 12px rgba(255,80,80,0.5)}
.sec-panel[data-color="blue"] .accent{color:rgba(100,170,255,0.9);text-shadow:0 0 12px rgba(80,150,255,0.5)}
.sec-panel[data-color="green"] .accent{color:rgba(80,220,140,0.9);text-shadow:0 0 12px rgba(60,200,120,0.5)}
.sec-panel[data-color="purple"] .accent{color:rgba(200,120,255,0.9);text-shadow:0 0 12px rgba(180,100,255,0.5)}
.sec-panel[data-color="white"] .accent{color:rgba(255,255,255,0.95);text-shadow:var(--glow)}

/* section typography */
.sec-label{font-size:.48rem;letter-spacing:.3em;color:var(--faint);margin-bottom:.5rem}
.sec-title{font-size:clamp(1.2rem,3vw,2rem);font-weight:100;letter-spacing:.12em;
  color:var(--white);text-shadow:var(--glow);margin-bottom:2.5rem;padding-bottom:1rem;
  border-bottom:1px solid rgba(255,255,255,.07)}
.sec-rule{height:1px;background:rgba(255,255,255,.06);margin:1.5rem 0}

p.body{font-size:.82rem;line-height:1.95;color:var(--dim);margin-bottom:.9rem}
p.body strong{color:var(--white);font-weight:400}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.06);margin-top:1.8rem}
.stat{padding:1rem;text-align:center;background:rgba(2,5,16,0.5)}
.stat b{display:block;font-size:1.8rem;font-weight:100;color:var(--white);
  text-shadow:var(--glow);margin-bottom:.2rem}
.stat small{font-size:.45rem;letter-spacing:.18em;color:var(--faint)}

.tline{border-left:1px solid rgba(255,255,255,.08);padding-left:1.8rem;margin-top:0}
.ti{position:relative;padding-bottom:2rem}
.ti:last-child{padding-bottom:0}
.ti::before{content:'';position:absolute;left:-1.9rem;top:.3rem;
  width:7px;height:7px;border:1px solid rgba(255,255,255,.3);border-radius:50%;background:rgba(2,5,16,1)}
.ti-date{font-size:.48rem;letter-spacing:.2em;color:var(--faint);margin-bottom:.35rem}
.ti-role{font-size:.88rem;font-weight:400;color:var(--white);margin-bottom:.08rem}
.ti-org{font-size:.72rem;font-style:italic;color:var(--dim);margin-bottom:.6rem}
.ti ul{list-style:none;padding:0}
.ti li{font-size:.76rem;line-height:1.8;color:var(--dim);padding-left:.8rem;
  position:relative;margin-bottom:.2rem}
.ti li::before{content:'–';position:absolute;left:0;color:rgba(255,255,255,.2)}

.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1px;
  background:rgba(255,255,255,.06)}
.pc{background:rgba(2,5,16,.6);padding:1.3rem;transition:background .2s;position:relative}
.pc:hover{background:rgba(8,15,40,.8)}
.pc-tag{font-size:.44rem;letter-spacing:.18em;color:var(--faint);margin-bottom:.4rem}
.pc-score{position:absolute;top:1.1rem;right:1.1rem;font-size:.46rem;
  letter-spacing:.1em;color:var(--dim)}
.pc-title{font-size:.82rem;font-weight:400;color:var(--white);margin-bottom:.5rem;
  line-height:1.3;padding-right:3.5rem}
.pc:hover .pc-title{text-shadow:var(--glow)}
.pc-desc{font-size:.72rem;line-height:1.75;color:var(--dim);margin-bottom:.8rem}
.pc-tech{display:flex;flex-wrap:wrap;gap:.25rem}
.pt{font-size:.42rem;letter-spacing:.1em;color:var(--faint);
  border:1px solid rgba(255,255,255,.07);padding:.1rem .35rem}

.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:1px;
  background:rgba(255,255,255,.06)}
.sg{background:rgba(2,5,16,.6);padding:1.1rem}
.sg-t{font-size:.46rem;letter-spacing:.22em;color:var(--faint);margin-bottom:.7rem}
.si{display:flex;flex-wrap:wrap;gap:.25rem}
.s{font-size:.52rem;color:var(--dim);padding:.15rem .4rem;
  border:1px solid rgba(255,255,255,.07);letter-spacing:.04em;transition:color .15s,border-color .15s}
.s:hover{color:var(--white);border-color:rgba(255,255,255,.2)}

.clinks{display:flex;flex-direction:column;gap:1px;background:rgba(255,255,255,.06);margin-bottom:1.5rem}
.cl2{display:flex;align-items:center;gap:1rem;text-decoration:none;
  padding:.8rem 1rem;background:rgba(2,5,16,.6);transition:background .2s}
.cl2:hover{background:rgba(8,15,40,.8)}
.cl2-l{font-size:.44rem;letter-spacing:.2em;color:var(--faint);margin-bottom:.1rem;transition:color .2s}
.cl2:hover .cl2-l{color:var(--white)}
.cl2-v{font-size:.76rem;color:var(--dim)}
.cl2-a{margin-left:auto;font-size:.7rem;color:rgba(255,255,255,.2);
  opacity:0;transition:opacity .2s,transform .2s}
.cl2:hover .cl2-a{opacity:1;transform:translateX(3px)}
.motto{font-size:.8rem;line-height:1.85;color:var(--faint);font-style:italic;
  border-left:1px solid rgba(255,255,255,.1);padding-left:1rem;margin-top:1.2rem}

/* loading */
#loading{position:fixed;inset:0;z-index:300;background:#020510;
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem;
  transition:opacity .8s}
#loading.done{opacity:0;pointer-events:none}
#loading p{font-size:.52rem;letter-spacing:.3em;color:var(--faint)}

@media(max-width:600px){
  .stats{grid-template-columns:1fr 1fr}
  .sec-panel{padding:1.5rem}
  #hero h1{font-size:2rem}
}
</style>
</head>
<body>
<div id="loading"><p>initialising</p></div>
<div id="cur"></div>
<div id="cur-trail"></div>
<canvas id="c"></canvas>

<div id="hub">
  <div class="node" id="n-about"    style="left:36%;top:34%"><div class="node-box"><div class="node-n">01</div><div class="node-l">about</div><div class="node-sub">dive in</div></div></div>
  <div class="node" id="n-exp"      style="left:67%;top:28%"><div class="node-box"><div class="node-n">02</div><div class="node-l">experience</div><div class="node-sub">dive in</div></div></div>
  <div class="node" id="n-projects" style="left:25%;top:57%"><div class="node-box"><div class="node-n">03</div><div class="node-l">projects</div><div class="node-sub">dive in</div></div></div>
  <div class="node" id="n-skills"   style="left:65%;top:63%"><div class="node-box"><div class="node-n">04</div><div class="node-l">skills</div><div class="node-sub">dive in</div></div></div>
  <div class="node" id="n-contact"  style="left:50%;top:75%"><div class="node-box"><div class="node-n">05</div><div class="node-l">contact</div><div class="node-sub">dive in</div></div></div>
</div>

<div id="hero">
  <h1>zuhair <span>abbas</span></h1>
  <p>computer vision · machine learning · visual computing</p>
  <small>navigate the space</small>
</div>

<button id="back">← return</button>

<div id="overlay">
  <!-- panels injected by JS -->
</div>




<script>
// renderer.js  — WebGL2, true 3D, depth-of-field particles, angelic creature
'use strict';

// ─── Mat4 helpers ─────────────────────────────────────────────────────────────
function m4()        { return new Float32Array(16); }
function ident()     { const m=m4(); m[0]=m[5]=m[10]=m[15]=1; return m; }
function mul(a,b) { const o=m4(); for(let c=0;c<4;c++) for(let r=0;r<4;r++) for(let k=0;k<4;k++) o[c*4+r]+=a[k*4+r]*b[c*4+k]; return o; }
function persp(fov,asp,n,f){ const m=m4(),t=1/Math.tan(fov*.5),d=f-n; m[0]=t/asp;m[5]=t;m[10]=-(f+n)/d;m[11]=-1;m[14]=-2*f*n/d; return m; }
function tr(x,y,z)   { const m=ident(); m[12]=x;m[13]=y;m[14]=z; return m; }
function rx(a)       { const m=ident(),c=Math.cos(a),s=Math.sin(a); m[5]=c;m[6]=-s;m[9]=s;m[10]=c; return m; }
function ry(a)       { const m=ident(),c=Math.cos(a),s=Math.sin(a); m[0]=c;m[2]=s;m[8]=-s;m[10]=c; return m; }
function sc(x,y,z)   { const m=ident(); m[0]=x;m[5]=y;m[10]=z; return m; }

// ─── Deterministic RNG ────────────────────────────────────────────────────────
function rng(seed) { const s=Math.sin(seed*127.1+311.7)*43758.5453; return s-Math.floor(s); }

// ─── Section definitions ──────────────────────────────────────────────────────
window.SECTIONS=[
  {id:'about',    camZ:40,  color:[1.00,0.24,0.24]},
  {id:'exp',      camZ:90,  color:[0.24,0.55,1.00]},
  {id:'projects', camZ:140, color:[0.24,0.85,0.50]},
  {id:'skills',   camZ:190, color:[0.64,0.32,1.00]},
  {id:'contact',  camZ:240, color:[1.00,1.00,1.00]},
];

// ─── Geometry ─────────────────────────────────────────────────────────────────
function ringVerts(r,segs) {
  const v=new Float32Array((segs+1)*3);
  for(let i=0;i<=segs;i++){const a=(i/segs)*Math.PI*2;v[i*3]=Math.cos(a)*r;v[i*3+1]=Math.sin(a)*r;}
  return v;
}

function buildCreature() {
  // spine
  const SPTS=36, sv=[];
  for(let i=0;i<=SPTS;i++){
    const t=i/SPTS, a=t*Math.PI*2.0, r=0.72*(1-t*.42);
    sv.push(Math.cos(a)*r, t*3.2-1.6, Math.sin(a)*r*.22);
  }
  // halos — 5 tilted rings
  const hv=[], hm=[];
  const HR=[{cy:-1.2,r:.52,tx:.28},{cy:-.45,r:.82,tx:-.18},{cy:.2,r:1.0,tx:.38},{cy:.85,r:.65,tx:-.14},{cy:1.38,r:.38,tx:.22}];
  const HSEGS=52;
  for(const h of HR){
    const s0=hv.length/3;
    for(let i=0;i<=HSEGS;i++){
      const a=(i/HSEGS)*Math.PI*2, cx=Math.cos(a)*h.r, cy2=Math.sin(a)*h.r;
      hv.push(cx, h.cy+cy2*Math.sin(h.tx), cy2*Math.cos(h.tx)*.18);
    }
    hm.push({s:s0,n:HSEGS+1});
  }
  // tendrils
  const tv=[], tm=[];
  const NT=10, TP=20;
  for(let ti=0;ti<NT;ti++){
    const ba=(ti/NT)*Math.PI*2, by=(ti%5-2)*.55, s0=tv.length/3;
    for(let i=0;i<=TP;i++){
      const s=i/TP, curl=s*s*Math.PI*2.2, r2=(1-s)*(.75+rng(ti)*.55);
      tv.push(Math.cos(ba+curl)*r2, by-s*1.7-s*s*.4, Math.sin(ba+curl)*r2*.16);
    }
    tm.push({s:s0,n:TP+1});
  }
  return {
    spine:    new Float32Array(sv), sN: SPTS+1,
    halos:    new Float32Array(hv), hm,
    tendrils: new Float32Array(tv), tm,
  };
}

function buildOrganisms() {
  return Array.from({length:26},(_, i)=>({
    x: (rng(i*7  )-.5)*95,
    y: (rng(i*7+1)-.5)*48,
    z: -(rng(i*7+2)*290+5),
    color: (()=>{
      for(const s of window.SECTIONS) if(-i*11.5>-(s.camZ+35)&&-i*11.5<-(s.camZ-35)) return s.color;
      return [1,.22,.22];
    })(),
    rings: Array.from({length:2+Math.floor(rng(i)*3)},(_,r)=>(.28+r*.24+rng(i*13+r)*.28)),
  }));
}

function buildParticles(n=750) {
  const v=new Float32Array(n*3);
  for(let i=0;i<n;i++){v[i*3]=(rng(i*3)-.5)*130;v[i*3+1]=(rng(i*3+1)-.5)*65;v[i*3+2]=-rng(i*3+2)*330;}
  return v;
}

// ─── Shaders ─────────────────────────────────────────────────────────────────

const LINE_VS=`#version 300 es
precision highp float;
in vec3 aPos;
uniform mat4 uMVP;
uniform float uCamZ;
out float vFog;
void main(){
  vec4 clip=uMVP*vec4(aPos,1.0);
  gl_Position=clip;
  float ndcZ=clip.z/clip.w;
  float distFog=1.0-smoothstep(0.15,0.97,ndcZ);
  vFog=distFog;
}`;

const LINE_FS=`#version 300 es
precision mediump float;
in float vFog;
uniform vec4 uColor;
out vec4 fc;
void main(){fc=vec4(uColor.rgb,uColor.a*vFog);}`;

const ORG_VS=`#version 300 es
precision highp float;
in vec3 aPos;
uniform mat4 uModel;
uniform mat4 uVP;
uniform float uCamZ;
out float vFog;
void main(){
  vec4 world=uModel*vec4(aPos,1.0);
  vec4 clip=uVP*world;
  gl_Position=clip;
  float ndcFog=1.0-smoothstep(0.15,0.97,clip.z/clip.w);
  float dist=abs(world.z+uCamZ);
  float df=1.0-smoothstep(8.0,210.0,dist);
  vFog=ndcFog*df;
}`;

const ORG_FS=`#version 300 es
precision mediump float;
in float vFog;
uniform vec3 uColor;
out vec4 fc;
void main(){fc=vec4(uColor*1.35,0.55*vFog);}`;

const PT_VS=`#version 300 es
precision highp float;
in vec3 aPos;
uniform mat4 uVP;
uniform float uT;
uniform float uCamZ;
uniform vec3 uAccent;
out float vAlpha;
out vec3  vCol;
out float vBlur;
void main(){
  vec3 p=aPos;
  p.x+=sin(uT*.13+aPos.z*.06)*.85;
  p.y+=cos(uT*.10+aPos.x*.08)*.50;
  vec4 clip=uVP*vec4(p,1.0);
  gl_Position=clip;
  float dist=abs(p.z+uCamZ);
  float focal=28.0;
  float blur=clamp(abs(dist-focal)/85.0,0.0,1.0);
  float szBase=mix(1.4,5.8,blur)+(1.0-blur)*1.2;
  gl_PointSize=max(szBase*(280.0/max(-clip.z,1.0)),0.5);
  float ndcFog=1.0-smoothstep(0.15,0.97,clip.z/clip.w);
  float df=1.0-smoothstep(18.0,290.0,dist);
  vAlpha=df*ndcFog*mix(0.78,0.11,blur);
  vBlur=blur;
  vCol=mix(vec3(0.72,0.84,1.0),uAccent,0.38*df);
}`;

const PT_FS=`#version 300 es
precision mediump float;
in float vAlpha;
in vec3  vCol;
in float vBlur;
out vec4 fc;
void main(){
  vec2 pc=gl_PointCoord-.5;
  float r=length(pc);
  float sig=mix(.21,.48,vBlur);
  float c=exp(-(r*r)/(2.0*sig*sig));
  if(c<.01)discard;
  fc=vec4(vCol,vAlpha*c);
}`;

// ─── Renderer ─────────────────────────────────────────────────────────────────
class Renderer {
  constructor(canvas) {
    this.canvas=canvas;
    const gl=canvas.getContext('webgl2',{antialias:true,alpha:false});
    if(!gl) throw new Error('WebGL2 unavailable');
    this.gl=gl;
    this.W=this.H=0;
    this.t=0;
    this.camZ=6;   this.camZT=6;
    this.tilt=0;   this.tiltT=0;
    this.accent=[.7,.85,1]; this.accentT=[.7,.85,1];
    this.mx=0;     this.my=0;
  }

  async init() {
    const gl=this.gl;
    this._lp=this._prog(LINE_VS,LINE_FS);
    this._op=this._prog(ORG_VS, ORG_FS);
    this._pp=this._prog(PT_VS,  PT_FS);

    const c=buildCreature();
    this._cr={
      sBuf:this._vb(c.spine),  sN:c.sN,
      hBuf:this._vb(c.halos),  hm:c.hm,
      tBuf:this._vb(c.tendrils),tm:c.tm,
    };

    this._orgs=buildOrganisms();
    this._orgRingBufs=this._orgs.map(o=>
      o.rings.map(r=>({b:this._vb(ringVerts(r,36)),n:37}))
    );

    const pts=buildParticles(750);
    this._ptB=this._vb(pts); this._ptN=pts.length/3;

    const sr=ringVerts(14,96); this._srB=this._vb(sr); this._srN=97;

    gl.enable(gl.BLEND);
    gl.blendFunc(gl.SRC_ALPHA,gl.ONE);
    gl.disable(gl.DEPTH_TEST);
    gl.clearColor(.008,.020,.063,1);

    document.addEventListener('mousemove',e=>{
      this.mx=(e.clientX/window.innerWidth -.5)*2;
      this.my=(e.clientY/window.innerHeight-.5)*2;
    });
    window.addEventListener('resize',()=>this._rsz());
    this._rsz();
    return this;
  }

  _rsz(){this.W=this.canvas.width=innerWidth;this.H=this.canvas.height=innerHeight;this.gl.viewport(0,0,this.W,this.H);}

  _vb(data){const gl=this.gl,b=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,b);gl.bufferData(gl.ARRAY_BUFFER,data,gl.STATIC_DRAW);return b;}

  _prog(vs,fs){
    const gl=this.gl;
    const mk=(t,s)=>{const sh=gl.createShader(t);gl.shaderSource(sh,s);gl.compileShader(sh);
      if(!gl.getShaderParameter(sh,gl.COMPILE_STATUS))throw new Error(gl.getShaderInfoLog(sh));return sh;};
    const p=gl.createProgram();
    gl.attachShader(p,mk(gl.VERTEX_SHADER,vs));
    gl.attachShader(p,mk(gl.FRAGMENT_SHADER,fs));
    gl.linkProgram(p);
    if(!gl.getProgramParameter(p,gl.LINK_STATUS))throw new Error(gl.getProgramInfoLog(p));
    return p;
  }

  setAccent(rgb){this.accentT=rgb;}
  setCamZ(z,tilt=0){this.camZT=z;this.tiltT=tilt;}

  frame(dt){
    const gl=this.gl; this.t+=dt; const t=this.t;
    this.camZ +=(this.camZT  -this.camZ )*.026;
    this.tilt +=(this.tiltT  -this.tilt )*.026;
    for(let i=0;i<3;i++) this.accent[i]+=(this.accentT[i]-this.accent[i])*.04;

    gl.clear(gl.COLOR_BUFFER_BIT);

    const P=persp(1.1,this.W/this.H,.5,500);
    const V=mul(mul(rx(this.my*.055+this.tilt),ry(this.mx*.07)),tr(0,0,-this.camZ));
    const VP=mul(P,V);

    this._drawOrgs(VP,t);
    this._drawSecMarkers(VP,t);
    this._drawPts(VP,t);
    this._drawCreature(VP,t);
  }

  // ── organism rings ──────────────────────────────────────────────────────────
  _drawOrgs(VP,t){
    const gl=this.gl,p=this._op;
    gl.useProgram(p);
    const vpLoc=gl.getUniformLocation(p,'uVP');
    const mLoc =gl.getUniformLocation(p,'uModel');
    const cLoc =gl.getUniformLocation(p,'uColor');
    const czLoc=gl.getUniformLocation(p,'uCamZ');
    const posLoc=gl.getAttribLocation(p,'aPos');
    gl.uniformMatrix4fv(vpLoc,false,VP);
    gl.uniform1f(czLoc,this.camZ);

    this._orgs.forEach((o,i)=>{
      const spin=t*(.075+i*.011)+i*1.4;
      const model=mul(tr(o.x,o.y+Math.sin(t*.28+i*.85)*.38,o.z),mul(ry(spin),rx(Math.sin(t*.42+i)*.12)));
      gl.uniformMatrix4fv(mLoc,false,model);
      gl.uniform3f(cLoc,...o.color);
      this._orgRingBufs[i].forEach(rb=>{
        gl.bindBuffer(gl.ARRAY_BUFFER,rb.b);
        gl.enableVertexAttribArray(posLoc);
        gl.vertexAttribPointer(posLoc,3,gl.FLOAT,false,0,0);
        gl.drawArrays(gl.LINE_STRIP,0,rb.n);
      });
    });
  }

  // ── section portal rings ────────────────────────────────────────────────────
  _drawSecMarkers(VP,t){
    for(const s of window.SECTIONS){
      const pulse=.065+.032*Math.sin(t*.5+s.camZ*.01);
      // outer
      this._lines(this._srB,this._srN, mul(VP,mul(tr(0,0,-s.camZ),rx(Math.PI/2))), s.color, pulse);
      // inner smaller
      this._lines(this._srB,this._srN, mul(VP,mul(tr(0,0,-s.camZ),mul(rx(Math.PI/2),sc(.55,.55,1)))), s.color, pulse*.5);
    }
  }

  // ── particles ───────────────────────────────────────────────────────────────
  _drawPts(VP,t){
    const gl=this.gl,p=this._pp;
    gl.useProgram(p);
    gl.bindBuffer(gl.ARRAY_BUFFER,this._ptB);
    const loc=gl.getAttribLocation(p,'aPos');
    gl.enableVertexAttribArray(loc);
    gl.vertexAttribPointer(loc,3,gl.FLOAT,false,0,0);
    gl.uniformMatrix4fv(gl.getUniformLocation(p,'uVP'),false,VP);
    gl.uniform1f(gl.getUniformLocation(p,'uT'),t);
    gl.uniform1f(gl.getUniformLocation(p,'uCamZ'),this.camZ);
    gl.uniform3f(gl.getUniformLocation(p,'uAccent'),...this.accent);
    gl.drawArrays(gl.POINTS,0,this._ptN);
  }

  // ── creature ────────────────────────────────────────────────────────────────
  _drawCreature(VP,t){
    const cr=this._cr;
    const swX=Math.sin(t*.58)*.52, swY=Math.cos(t*.43)*.28;
    const worldZ=-(this.camZ-8);
    const model=mul(tr(swX,swY,worldZ),mul(ry(t*.42),rx(Math.sin(t*.33)*.17)));
    const MVP=mul(VP,model);

    // spine — two passes (bright + soft glow)
    this._lines(cr.sBuf,cr.sN,MVP,[.92,.96,1.0],.82);
    this._lines(cr.sBuf,cr.sN,MVP,[.6,.82,1.0],.22);

    // halos
    cr.hm.forEach((h,i)=>{
      const a=.26+.13*Math.sin(t*1.05+i*.85);
      this._linesOff(cr.hBuf,h.s,h.n,MVP,[.88,.93,1.0],a);
    });

    // tendrils
    cr.tm.forEach((ten,i)=>{
      const a=.11+.07*Math.sin(t*.72+i*.6);
      this._linesOff(cr.tBuf,ten.s,ten.n,MVP,[.72,.88,1.0],a);
    });
  }

  // ── low-level draw ──────────────────────────────────────────────────────────
  _lines(buf,n,MVP,rgb,a){
    const gl=this.gl,p=this._lp;
    gl.useProgram(p);
    gl.bindBuffer(gl.ARRAY_BUFFER,buf);
    const loc=gl.getAttribLocation(p,'aPos');
    gl.enableVertexAttribArray(loc);
    gl.vertexAttribPointer(loc,3,gl.FLOAT,false,0,0);
    gl.uniformMatrix4fv(gl.getUniformLocation(p,'uMVP'),false,MVP);
    gl.uniform4f(gl.getUniformLocation(p,'uColor'),...rgb,a);
    gl.uniform1f(gl.getUniformLocation(p,'uCamZ'),this.camZ);
    gl.drawArrays(gl.LINE_STRIP,0,n);
  }

  _linesOff(buf,start,n,MVP,rgb,a){
    const gl=this.gl,p=this._lp;
    gl.useProgram(p);
    gl.bindBuffer(gl.ARRAY_BUFFER,buf);
    const loc=gl.getAttribLocation(p,'aPos');
    gl.enableVertexAttribArray(loc);
    gl.vertexAttribPointer(loc,3,gl.FLOAT,false,0,start*12);
    gl.uniformMatrix4fv(gl.getUniformLocation(p,'uMVP'),false,MVP);
    gl.uniform4f(gl.getUniformLocation(p,'uColor'),...rgb,a);
    gl.uniform1f(gl.getUniformLocation(p,'uCamZ'),this.camZ);
    gl.drawArrays(gl.LINE_STRIP,0,n);
  }
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
(async()=>{
  const canvas=document.getElementById('c');
  let R;
  try{ R=await new Renderer(canvas).init(); }
  catch(e){ console.error(e); document.querySelector('#loading p').textContent='webgl2 unavailable'; return; }
  window.renderer=R;
  setTimeout(()=>document.getElementById('loading').classList.add('done'),700);
  let last=performance.now();
  const loop=now=>{ R.frame(Math.min((now-last)*.001,.05)); last=now; requestAnimationFrame(loop); };
  requestAnimationFrame(loop);
})();

// ─── Navigation state ─────────────────────────────────────────────────────────
const hub      = document.getElementById('hub');
const heroEl   = document.getElementById('hero');
const backBtn  = document.getElementById('back');

let state = 'hub';
let currentPanel = null;

const nodeToSection = {
  'n-about':    'about',
  'n-exp':      'exp',
  'n-projects': 'projects',
  'n-skills':   'skills',
  'n-contact':  'contact',
};

const sectionToZ = {
  'about':    { z: 40,  tilt: 0.04 },
  'exp':      { z: 90,  tilt: 0.06 },
  'projects': { z: 140, tilt: -0.04 },
  'skills':   { z: 190, tilt: 0.05 },
  'contact':  { z: 240, tilt: 0.0 },
};

const sectionToAccent = {
  'about':    [1.0, 0.25, 0.25],
  'exp':      [0.25, 0.55, 1.0],
  'projects': [0.25, 0.85, 0.50],
  'skills':   [0.65, 0.32, 1.0],
  'contact':  [1.0,  1.0,  1.0],
};

function diveInto(sectionKey) {
  if (state === 'section') return;
  state = 'section';

  // Camera dive
  const { z, tilt } = sectionToZ[sectionKey];
  const accent = sectionToAccent[sectionKey];
  if (window.renderer) {
    window.renderer.setCamZ(z, tilt);
    window.renderer.setAccent(accent);
  }

  // Hide hub
  hub.style.opacity = '0';
  hub.style.pointerEvents = 'none';
  heroEl.style.opacity = '0';

  // Show panel after camera starts moving
  setTimeout(() => {
    document.querySelectorAll('.sec-panel').forEach(p => p.style.display = 'none');
    const panel = overlay.querySelector(`[data-section="${sectionKey}"]`);
    if (panel) { panel.style.display = 'block'; currentPanel = panel; }
    overlay.classList.add('vis');
  }, 400);

  backBtn.classList.add('vis');
}

function returnToHub() {
  if (state === 'hub') return;
  state = 'hub';

  overlay.classList.remove('vis');
  setTimeout(() => {
    if (currentPanel) currentPanel.style.display = 'none';
  }, 600);

  hub.style.opacity = '1';
  hub.style.pointerEvents = 'auto';
  heroEl.style.opacity = '1';
  backBtn.classList.remove('vis');

  if (window.renderer) {
    window.renderer.setCamZ(6, 0);
    window.renderer.setAccent([0.8, 0.88, 1.0]);
  }
}

// ─── Bind nodes ───────────────────────────────────────────────────────────────
document.querySelectorAll('.node').forEach(node => {
  const key = nodeToSection[node.id];
  if (!key) return;
  node.addEventListener('click', () => diveInto(key));
});

backBtn.addEventListener('click', returnToHub);
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') returnToHub();
});

// ─── Node parallax in hub ────────────────────────────────────────────────────
document.addEventListener('mousemove', e => {
  if (state !== 'hub') return;
  const nx = (e.clientX / window.innerWidth  - 0.5) * 2;

    const d = 0.4 + i * 0.13;
    n.style.transform = `translate(calc(-50% + ${nx*22*d}px), calc(-50% + ${ny*14*d}px))`;

});
